name: Build PGPM (Windows)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # needed to attach PGPM.exe to a Release

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r files/requirements.txt pyinstaller

      - name: Build PGPM.exe
        run: pyinstaller --onefile --windowed --name PGPM --icon assets/icon.ico --add-data "assets;assets" --add-data "fonts;fonts" --noconfirm files/pgp_messenger.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: PGPM-windows
          path: dist/PGPM.exe

      - name: Attach to Release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/PGPM.exe
